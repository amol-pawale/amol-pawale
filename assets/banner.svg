<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Amol Pawale — Senior Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAF9F5"/>
      <stop offset="1" stop-color="#F0EEE6"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D4A27F"/>
      <stop offset="1" stop-color="#CC785C"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>

  <!-- subtle geometric motif on the right (nested arcs, Anthropic-ish warmth) -->
  <g opacity="0.10" stroke="#CC785C" stroke-width="2" fill="none">
    <circle cx="1050" cy="150" r="40"/>
    <circle cx="1050" cy="150" r="75"/>
    <circle cx="1050" cy="150" r="110"/>
    <circle cx="1050" cy="150" r="145"/>
  </g>
  <g opacity="0.6" fill="#CC785C">
    <circle cx="1050" cy="150" r="6"/>
  </g>

  <!-- left accent bar -->
  <rect x="72" y="96" width="6" height="108" rx="3" fill="url(#clay)"/>

  <!-- name -->
  <text x="104" y="132" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#3D3D3A">Amol Pawale</text>

  <!-- role -->
  <text x="106" y="176" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#CC785C">Senior Software Engineer</text>

  <!-- tagline -->
  <text x="106" y="212" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="400" fill="#6B6B66">Backend Architecture &#183; Salesforce Integrations &#183; Aspiring Solutions Architect</text>

  <!-- small pill tags -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600">
    <rect x="106" y="236" width="66" height="26" rx="13" fill="#CC785C"/>
    <text x="139" y="253" fill="#FAF9F5" text-anchor="middle">.NET</text>

    <rect x="180" y="236" width="104" height="26" rx="13" fill="#FFFFFF" stroke="#CC785C" stroke-width="1.2"/>
    <text x="232" y="253" fill="#CC785C" text-anchor="middle">Clean Arch</text>

    <rect x="292" y="236" width="92" height="26" rx="13" fill="#FFFFFF" stroke="#CC785C" stroke-width="1.2"/>
    <text x="338" y="253" fill="#CC785C" text-anchor="middle">Salesforce</text>

    <rect x="392" y="236" width="66" height="26" rx="13" fill="#FFFFFF" stroke="#CC785C" stroke-width="1.2"/>
    <text x="425" y="253" fill="#CC785C" text-anchor="middle">Kong</text>
  </g>
</svg>
